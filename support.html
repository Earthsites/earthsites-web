<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Earthsites — Support</title>
  <meta name="description" content="Earthsites support and contact." />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="wrap">
    <nav class="nav">
      <a class="brand" href="/">Earthsites</a>
      <div class="links">
        <a href="/privacy">Privacy</a>
        <a class="active" href="/support">Support</a>
      </div>
    </nav>

    <section class="pagehead">
      <h1>Support</h1>
      <p class="sub">Send us a message using the form below.</p>
    </section>
  </header>

  <main class="wrap prose">
    <div class="form-card">
      <form class="contact-form" action="https://formspree.io/f/xaqdgovp" method="POST" id="supportForm">
        <div class="field-row">
          <label class="field">
            <span>Your name</span>
            <input type="text" name="name" autocomplete="name" required />
          </label>

          <label class="field">
            <span>Your email</span>
            <input type="email" name="email" autocomplete="email" required />
          </label>
        </div>

        <label class="field">
          <span>Message</span>
          <textarea name="message" rows="6" required></textarea>
        </label>

        <!-- Lightweight math check (helps vs basic bots) -->
        <label class="field">
          <span>Quick check: what is 2 + 3?</span>
          <input type="text" name="human_check" inputmode="numeric" pattern="5" placeholder="Type 5" required />
        </label>

        <!-- Honeypot (bots often fill it; humans won't) -->
        <input type="text" name="_gotcha" class="hp" tabindex="-1" autocomplete="off" />

        <!-- Subject line in your inbox -->
        <input type="hidden" name="_subject" value="Earthsites Support Request" />

        <!-- Redirect to success page -->
        <input type="hidden" name="_next" value="https://earthsites.com/thanks" />

        <button type="submit" class="button">Send message</button>

        <p class="fine" style="margin-top:10px;">
          Please don’t include sensitive personal info. For privacy-related questions, mention “Privacy” in your message.
        </p>
      </form>
    </div>
  </main>
</body>
</html>
