<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Earthsites — Support</title>
  <meta name="description" content="Earthsites support and contact." />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="wrap">
    <nav class="nav">
      <a class="brand" href="/">Earthsites</a>
      <div class="links">
        <a href="/privacy">Privacy</a>
        <a class="active" href="/support">Support</a>
      </div>
    </nav>

    <section class="pagehead">
      <h1>Support</h1>
      <p class="sub">Send us a message using the form below.</p>
    </section>
  </header>

  <main class="wrap prose">
    <div class="form-card">
      <form class="contact-form" action="https://formspree.io/f/xaqdgovp" method="POST">
  <div class="field-row">
    <label class="field">
      <span>Name</span>
      <input type="text" name="name" autocomplete="name" required />
    </label>

    <label class="field">
      <span>Email</span>
      <input type="email" name="email" autocomplete="email" required />
    </label>
  </div>

  <label class="field">
    <span>Topic</span>
    <select name="topic" required>
      <option value="" selected disabled>Select one…</option>
      <option value="General Support">General Support</option>
      <option value="Privacy">Privacy</option>
      <option value="Bug Report">Bug Report</option>
      <option value="Feature Request">Feature Request</option>
    </select>
  </label>

  <label class="field">
    <span>Message</span>
    <textarea name="message" rows="6" required></textarea>
  </label>

  <label class="field">
    <span>Quick check: 2 + 3 =</span>
    <input type="text" name="human_check" inputmode="numeric" pattern="5" placeholder="5" required />
  </label>

  <label class="check">
    <input type="checkbox" name="privacy_consent" required />
    <span>
      I agree to the <a href="/privacy" target="_blank" rel="noopener">privacy policy</a>.
    </span>
  </label>

  <input type="text" name="_gotcha" class="hp" tabindex="-1" autocomplete="off" />

  <input type="hidden" name="subject" value="Earthsites — {{topic}} — {{name}}" />

  <input type="hidden" name="_next" value="https://earthsites.com/thanks" />

  <button type="submit" class="button button-submit">Send message</button>

  <p class="fine calm-note">
    You’ll see a confirmation after submitting. We respond as soon as we can.
  </p>
</form>
    </div>
  </main>
  <script>
  const params = new URLSearchParams(window.location.search);
  const topic = params.get("topic");

  if (topic) {
    const select = document.querySelector('select[name="topic"]');
    if (select) {
      select.value = topic;
    }
  }
</script>
</body>
</html>
